name: Save CRM Data
on:
  repository_dispatch:
    types: [save-data]
jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
      - run: |
          echo '${{ github.event.client_payload.data }}' > data.json
          git config user.email "bot@github.com"
          git config user.name "CRM Bot"
          git add data.json
          git commit -m "auto: crm data" || true
          git push
